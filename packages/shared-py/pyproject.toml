[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "popkit-shared"
version = "1.0.0"
description = "Shared utilities for PopKit plugin ecosystem"
authors = ["Joseph Cannon <joseph@thehouseofdeals.com>"]
license = "MIT"
readme = "README.md"
packages = [{include = "popkit_shared"}]

[tool.poetry.dependencies]
python = "^3.11"
pyyaml = "^6.0"
filelock = "^3.13.0"
lxml = {version = "^6.0", optional = true}

[tool.poetry.extras]
xml-validation = ["lxml"]

[tool.poetry.group.dev.dependencies]
pytest = "^9.0"
pytest-cov = "^7.0"
ruff = "^0.15.0"
mypy = "^1.8"

[tool.ruff]
# Target Python 3.11+ (modernized)
target-version = "py311"

# Line length
line-length = 100

# Exclude generated and vendored files
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

[tool.ruff.lint]
# Rule groups:
# E  = pycodestyle (style errors)
# F  = Pyflakes (logic errors, unused imports)
# I  = isort (import sorting)
# S  = flake8-bandit (security) — catches try-except-pass, hardcoded passwords, etc.
# BLE = flake8-blind-except — catches bare 'except Exception'
# UP = pyupgrade — modernize syntax for Python 3.11+
select = ["E", "F", "I", "S110", "BLE", "UP"]

# Ignore specific rules
ignore = [
    "E501",   # Line too long (handled by formatter)
    "BLE001", # Blind except Exception — too strict for existing codebase
    "UP006",  # Use dict instead of Dict — 235+ existing usages, fix incrementally
    "UP007",  # Use X | Y for union types — wait until we drop 3.10 compat
    "UP015",  # Unnecessary open mode "r" — pedantic, not a bug
    "UP024",  # Replace IOError with OSError — cosmetic alias change
    "UP035",  # typing.Dict/List deprecated — same as UP006
    "UP036",  # Version block outdated — codex adapter needs 3.10 compat
    "UP042",  # Use StrEnum — requires Python 3.11 minimum everywhere
    "UP045",  # Use X | None instead of Optional — 100+ usages, fix incrementally
]

# Treat S110 as warning for existing code — new code should avoid bare try-except-pass
# UP017 (datetime.UTC) has ~30 usages, fix incrementally
[tool.ruff.lint.per-file-ignores]
"hooks/*.py" = ["S110"]                    # Hooks are intentionally best-effort
"tests/**/*.py" = ["S110", "UP017"]        # Test helpers — fix incrementally
"popkit_shared/utils/*.py" = ["S110", "UP017"]  # Legacy utils — fix incrementally
"popkit_shared/storage/*.py" = ["S110"]    # Storage layer — best-effort patterns

[tool.ruff.lint.isort]
# Use single line imports
force-single-line = false
# Known first party
known-first-party = ["popkit_shared"]

[tool.ruff.format]
# Use double quotes for strings
quote-style = "double"

# Indent with 4 spaces
indent-style = "space"

[tool.mypy]
# Target Python 3.11
python_version = "3.11"

# Strict mode settings (start permissive, tighten later)
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true

# Allow gradual typing adoption
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true

# Show error codes
show_error_codes = true

# Import discovery
namespace_packages = true
explicit_package_bases = true
