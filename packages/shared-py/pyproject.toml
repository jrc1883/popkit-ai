[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "popkit-shared"
version = "1.0.0"
description = "Shared utilities for PopKit plugin ecosystem"
authors = ["Joseph Cannon <joseph@thehouseofdeals.com>"]
license = "MIT"
readme = "README.md"
packages = [{include = "popkit_shared"}]

[tool.poetry.dependencies]
python = "^3.11"
pyyaml = "^6.0"
filelock = "^3.13.0"
lxml = {version = "^6.0", optional = true}

[tool.poetry.extras]
xml-validation = ["lxml"]

[tool.poetry.group.dev.dependencies]
pytest = "^9.0"
pytest-cov = "^7.0"
ruff = "^0.14.11"
mypy = "^1.8"

[tool.ruff]
# Target Python 3.11+ (modernized)
target-version = "py311"

# Line length
line-length = 100

# Exclude generated and vendored files
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

[tool.ruff.lint]
# Enable pycodestyle (`E`) and Pyflakes (`F`) codes by default
# Add isort (`I`) for import sorting
select = ["E", "F", "I"]

# Ignore specific rules
ignore = [
    "E501",  # Line too long (handled by formatter)
]

[tool.ruff.lint.isort]
# Use single line imports
force-single-line = false
# Known first party
known-first-party = ["popkit_shared"]

[tool.ruff.format]
# Use double quotes for strings
quote-style = "double"

# Indent with 4 spaces
indent-style = "space"

[tool.mypy]
# Target Python 3.11
python_version = "3.11"

# Strict mode settings (start permissive, tighten later)
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true

# Allow gradual typing adoption
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true

# Show error codes
show_error_codes = true

# Import discovery
namespace_packages = true
explicit_package_bases = true
