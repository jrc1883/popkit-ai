name = "popkit-cloud-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# Upstash Redis connection (set via secrets)
# wrangler secret put UPSTASH_REDIS_REST_URL
# wrangler secret put UPSTASH_REDIS_REST_TOKEN

# Upstash Vector for semantic agent search (Issue #101)
# wrangler secret put UPSTASH_VECTOR_REST_URL
# wrangler secret put UPSTASH_VECTOR_REST_TOKEN

# Upstash Workflow/QStash for durable workflows (Issue #103)
# wrangler secret put QSTASH_TOKEN
# Optional: wrangler secret put QSTASH_CURRENT_SIGNING_KEY
# Optional: wrangler secret put QSTASH_NEXT_SIGNING_KEY

# Rate limiting settings
[vars.rate_limits]
free_requests_per_minute = 100
pro_requests_per_minute = 1000
team_requests_per_minute = 10000

# KV Namespaces
[[kv_namespaces]]
binding = "WAITLIST_KV"
id = "your-waitlist-kv-id"  # Replace with actual KV namespace ID after creation

# D1 Database (optional, for waitlist analytics)
# [[d1_databases]]
# binding = "DB"
# database_name = "popkit-db"
# database_id = "your-d1-database-id"
