[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "popkit-mcp"
version = "1.0.0"
description = "PopKit MCP Server - exposes skills, agents, and commands as MCP tools"
authors = ["Joseph Cannon <joseph@thehouseofdeals.com>"]
license = "LicenseRef-PolyForm-Noncommercial-1.0.0"
readme = "README.md"
packages = [{include = "popkit_mcp"}]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[tool.poetry.urls]
"Homepage" = "https://github.com/jrc1883/popkit-claude"
"Repository" = "https://github.com/jrc1883/popkit-claude"

[tool.poetry.dependencies]
python = "^3.11"
mcp = "^1.12.0"
pyyaml = "^6.0"
popkit-shared = {version = "^1.0.0", optional = true}

[tool.poetry.extras]
full = ["popkit-shared"]

[tool.poetry.scripts]
# uvx popkit-mcp  — standard MCP convention
popkit-mcp = "popkit_mcp.server:main"
# Also support the longer name
popkit-mcp-server = "popkit_mcp.server:main"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]
