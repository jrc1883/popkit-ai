# First-Time Contributor Greetings
#
# Welcomes first-time contributors when they:
# - Open their first issue
# - Open their first pull request
#
# Part of Issue #179 (Add GitHub Actions workflows)

name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    name: Greet First-Time Contributors
    runs-on: ubuntu-latest

    steps:
      - name: Greet first-time issue author
        if: github.event_name == 'issues'
        uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            👋 Welcome to PopKit, @${{ github.actor }}! Thanks for opening your first issue.

            **What happens next:**
            - A maintainer will review your issue and add appropriate labels
            - If you have questions, feel free to ask in the issue comments
            - For feature requests, consider adding your use case to help prioritize

            **Helpful resources:**
            - 📖 [README](https://github.com/jrc1883/popkit-claude#readme) - Quick start guide
            - 💬 [Discussions](https://github.com/jrc1883/popkit-claude/discussions) - Ask questions
            - 🐛 [Issue templates](https://github.com/jrc1883/popkit-claude/issues/new/choose) - Report bugs or request features

            Thanks for contributing to PopKit! 🎉

      - name: Greet first-time PR author
        if: github.event_name == 'pull_request_target'
        uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          pr_message: |
            👋 Welcome to PopKit, @${{ github.actor }}! Thanks for opening your first pull request.

            **What happens next:**
            - CI checks will run automatically
            - A maintainer will review your changes
            - We may request changes or ask questions

            **Before your PR can be merged:**
            - [ ] All CI checks pass
            - [ ] Code follows existing patterns in the codebase
            - [ ] Documentation updated if needed
            - [ ] Commit messages follow conventional commits format

            **Helpful tips:**
            - Keep PRs focused on a single change
            - Link related issues with "Fixes #123" or "Closes #123"
            - Feel free to ask questions in the PR comments

            Thanks for contributing to PopKit! 🎉
