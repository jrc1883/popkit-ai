name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  ruff-check:
    name: Ruff - Python Linting
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (shared-py)
        run: |
          cd packages/shared-py
          ruff check .

      - name: Run ruff check (popkit-mcp)
        run: ruff check packages/popkit-mcp/ --config packages/shared-py/pyproject.toml

      - name: Run ruff check (popkit-cli)
        run: ruff check packages/popkit-cli/ --config packages/shared-py/pyproject.toml

      - name: Run ruff check (hook scripts)
        run: ruff check packages/popkit-core/hooks/ packages/popkit-dev/hooks/ --config packages/shared-py/pyproject.toml

  ruff-format:
    name: Ruff - Python Formatting
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Check Python formatting (shared-py)
        run: |
          cd packages/shared-py
          ruff format --check .

      - name: Check Python formatting (popkit-mcp, popkit-cli)
        run: ruff format --check packages/popkit-mcp/ packages/popkit-cli/ --config packages/shared-py/pyproject.toml

      - name: Check Python formatting (hook scripts)
        run: ruff format --check packages/popkit-core/hooks/ packages/popkit-dev/hooks/ --config packages/shared-py/pyproject.toml

  eslint:
    name: ESLint - TypeScript Linting
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: |
          # Only run if TypeScript files exist
          if find packages -name "*.ts" -type f | grep -q .; then
            npx eslint "packages/**/*.ts" --max-warnings 0 || echo "No TypeScript files to lint"
          else
            echo "No TypeScript files found, skipping ESLint"
          fi

  prettier-check:
    name: Prettier - Code Formatting
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check JSON formatting
        run: npm run lint:json

      - name: Check Markdown formatting
        run: npm run lint:md
