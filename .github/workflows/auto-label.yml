# Auto-Label Issues and PRs
#
# Automatically labels issues based on content keywords and
# PRs based on files changed.
#
# Part of Issue #147 (Implement issue automation)

name: Auto Label

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # AUTO-LABEL ISSUES
  # =============================================================================

  label-issues:
    name: Label Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'

    steps:
      - name: Label based on content
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const text = title + ' ' + body;

            const labelsToAdd = [];

            // Type labels
            if (text.includes('bug') || text.includes('error') || text.includes('broken') || text.includes('fix')) {
              labelsToAdd.push('bug');
            }
            if (text.includes('feature') || text.includes('enhancement') || text.includes('add support') || text.includes('implement')) {
              labelsToAdd.push('enhancement');
            }
            if (text.includes('documentation') || text.includes('docs') || text.includes('readme')) {
              labelsToAdd.push('documentation');
            }
            if (text.includes('question') || text.includes('how to') || text.includes('help')) {
              labelsToAdd.push('question');
            }

            // Area labels
            if (text.includes('plugin') || text.includes('skill') || text.includes('agent') || text.includes('command')) {
              labelsToAdd.push('plugin');
            }
            if (text.includes('cloud') || text.includes('api') || text.includes('cloudflare') || text.includes('worker')) {
              labelsToAdd.push('cloud');
            }
            if (text.includes('hook') || text.includes('python')) {
              labelsToAdd.push('hooks');
            }
            if (text.includes('power mode') || text.includes('multi-agent') || text.includes('parallel')) {
              labelsToAdd.push('power-mode');
            }

            // Priority hints (don't auto-assign P0/P1 - those need human judgment)
            if (text.includes('critical') || text.includes('urgent') || text.includes('asap') || text.includes('blocker')) {
              labelsToAdd.push('needs-triage');
            }

            // Security
            if (text.includes('security') || text.includes('vulnerability') || text.includes('auth') || text.includes('token')) {
              labelsToAdd.push('security');
            }

            // Performance
            if (text.includes('performance') || text.includes('slow') || text.includes('optimize') || text.includes('speed')) {
              labelsToAdd.push('performance');
            }

            if (labelsToAdd.length > 0) {
              // Filter to only labels that exist in the repo
              try {
                const existingLabels = await github.rest.issues.listLabelsForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100
                });
                const validLabels = existingLabels.data.map(l => l.name);
                const labelsToApply = labelsToAdd.filter(l => validLabels.includes(l));

                if (labelsToApply.length > 0) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: labelsToApply
                  });
                  console.log(`Added labels: ${labelsToApply.join(', ')}`);
                }
              } catch (error) {
                console.log('Note: Some labels may not exist in repo. Create them first.');
                console.log(`Attempted labels: ${labelsToAdd.join(', ')}`);
              }
            }

  # =============================================================================
  # AUTO-LABEL PULL REQUESTS
  # =============================================================================

  label-prs:
    name: Label PRs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Label based on files changed
        uses: actions/labeler@v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml

      - name: Label size
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;

            // Calculate PR size
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const changes = additions + deletions;

            let sizeLabel = 'size/S';
            if (changes > 500) {
              sizeLabel = 'size/XL';
            } else if (changes > 200) {
              sizeLabel = 'size/L';
            } else if (changes > 50) {
              sizeLabel = 'size/M';
            }

            // Check if label exists before adding
            try {
              const existingLabels = await github.rest.issues.listLabelsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });
              const validLabels = existingLabels.data.map(l => l.name);

              if (validLabels.includes(sizeLabel)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: [sizeLabel]
                });
                console.log(`Added size label: ${sizeLabel}`);
              }
            } catch (error) {
              console.log('Size labels may not exist. Create size/S, size/M, size/L, size/XL labels.');
            }
