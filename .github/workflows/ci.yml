# CI Pipeline
#
# Runs on every push to master and every pull request.
# Creates status checks that branch protection can require.
#
# Part of Issue #146 (GitHub Actions CI/CD workflows)

name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # PLUGIN VALIDATION
  # =============================================================================

  plugin-validate:
    name: Validate Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          echo "Validating plugin.json..."

          # Check plugin.json exists
          if [ ! -f "packages/plugin/.claude-plugin/plugin.json" ]; then
            echo "Error: plugin.json not found"
            exit 1
          fi

          # Validate JSON syntax
          cat packages/plugin/.claude-plugin/plugin.json | python -m json.tool > /dev/null

          # Check required fields
          python3 << 'EOF'
          import json
          import sys

          with open("packages/plugin/.claude-plugin/plugin.json") as f:
              plugin = json.load(f)

          required_fields = ["name", "version", "description"]
          missing = [f for f in required_fields if f not in plugin]

          if missing:
              print(f"Error: Missing required fields: {missing}")
              sys.exit(1)

          print(f"Plugin: {plugin['name']} v{plugin['version']}")
          print("plugin.json validation passed!")
          EOF

      - name: Validate marketplace.json
        run: |
          echo "Validating marketplace.json..."

          # Check marketplace.json exists
          if [ ! -f "packages/plugin/.claude-plugin/marketplace.json" ]; then
            echo "Error: marketplace.json not found"
            exit 1
          fi

          # Validate JSON syntax
          cat packages/plugin/.claude-plugin/marketplace.json | python -m json.tool > /dev/null

          echo "marketplace.json validation passed!"

      - name: Check version consistency
        run: |
          echo "Checking version consistency..."

          PLUGIN_VERSION=$(cat packages/plugin/.claude-plugin/plugin.json | python -c "import json,sys; print(json.load(sys.stdin)['version'])")
          # marketplace.json has version inside plugins[0].version
          MARKETPLACE_VERSION=$(cat packages/plugin/.claude-plugin/marketplace.json | python -c "import json,sys; print(json.load(sys.stdin)['plugins'][0]['version'])")

          if [ "$PLUGIN_VERSION" != "$MARKETPLACE_VERSION" ]; then
            echo "Error: Version mismatch!"
            echo "  plugin.json: $PLUGIN_VERSION"
            echo "  marketplace.json: $MARKETPLACE_VERSION"
            exit 1
          fi

          echo "Versions match: $PLUGIN_VERSION"

  # =============================================================================
  # AGENT CONFIGURATION VALIDATION
  # =============================================================================

  agents-validate:
    name: Validate Agents
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agents/config.json
        run: |
          echo "Validating agents/config.json..."

          CONFIG_PATH="packages/plugin/agents/config.json"

          if [ ! -f "$CONFIG_PATH" ]; then
            echo "Error: config.json not found"
            exit 1
          fi

          # Validate JSON syntax
          cat "$CONFIG_PATH" | python -m json.tool > /dev/null

          # Check structure
          python3 << 'EOF'
          import json
          import sys

          with open("packages/plugin/agents/config.json") as f:
              config = json.load(f)

          # Check for expected top-level keys
          expected_keys = ["routing", "tiers", "workflows"]
          for key in expected_keys:
              if key not in config:
                  print(f"Warning: Missing key '{key}' in config.json")

          print("agents/config.json validation passed!")
          EOF

      - name: Count agents
        run: |
          echo "Agent counts:"
          echo "  Tier 1: $(ls -1 packages/plugin/agents/tier-1-always-active/ 2>/dev/null | wc -l)"
          echo "  Tier 2: $(ls -1 packages/plugin/agents/tier-2-on-demand/ 2>/dev/null | wc -l)"
          echo "  Feature Workflow: $(ls -1 packages/plugin/agents/feature-workflow/ 2>/dev/null | wc -l)"

  # =============================================================================
  # HOOKS VALIDATION
  # =============================================================================

  hooks-validate:
    name: Validate Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Validate hooks.json
        run: |
          echo "Validating hooks.json..."

          HOOKS_PATH="packages/plugin/hooks/hooks.json"

          if [ ! -f "$HOOKS_PATH" ]; then
            echo "Error: hooks.json not found"
            exit 1
          fi

          # Validate JSON syntax
          cat "$HOOKS_PATH" | python -m json.tool > /dev/null

          echo "hooks.json validation passed!"

      - name: Check Python syntax in hooks
        run: |
          echo "Checking Python syntax..."

          cd packages/plugin/hooks

          # Check all .py files for syntax errors
          for file in *.py utils/*.py; do
            if [ -f "$file" ]; then
              python -m py_compile "$file" && echo "  ✓ $file" || exit 1
            fi
          done

          echo "All Python hooks have valid syntax!"

  # =============================================================================
  # CLOUD API VALIDATION
  # =============================================================================

  cloud-validate:
    name: Validate Cloud API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Note: cache disabled because package-lock.json is gitignored
          # cache: 'npm'
          # cache-dependency-path: packages/cloud/package-lock.json

      - name: Install dependencies
        run: |
          cd packages/cloud
          npm ci

      - name: TypeScript check
        run: |
          cd packages/cloud
          npx tsc --noEmit

      - name: Validate wrangler.toml
        run: |
          if [ ! -f "packages/cloud/wrangler.toml" ]; then
            echo "Error: wrangler.toml not found"
            exit 1
          fi
          echo "wrangler.toml exists"

  # =============================================================================
  # SUMMARY JOB
  # =============================================================================

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs:
      - plugin-validate
      - agents-validate
      - hooks-validate
      - cloud-validate
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.plugin-validate.result }}" != "success" ]; then
            echo "Plugin validation failed"
            exit 1
          fi
          if [ "${{ needs.agents-validate.result }}" != "success" ]; then
            echo "Agents validation failed"
            exit 1
          fi
          if [ "${{ needs.hooks-validate.result }}" != "success" ]; then
            echo "Hooks validation failed"
            exit 1
          fi
          if [ "${{ needs.cloud-validate.result }}" != "success" ]; then
            echo "Cloud validation failed"
            exit 1
          fi

          echo "All CI checks passed!"

      - name: Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin Validation | ${{ needs.plugin-validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agents Validation | ${{ needs.agents-validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hooks Validation | ${{ needs.hooks-validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Validation | ${{ needs.cloud-validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
