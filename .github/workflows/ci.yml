# CI Pipeline
#
# Runs on every push to master and every pull request.
# Creates status checks that branch protection can require.
#
# Part of Issue #146 (GitHub Actions CI/CD workflows)

name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # PLUGIN VALIDATION
  # =============================================================================

  plugin-validate:
    name: Validate Plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate modular plugins
        run: |
          echo "Validating modular plugin structure..."

          PLUGINS=(
            "popkit-core"
            "popkit-dev"
            "popkit-ops"
            "popkit-research"
            "popkit-suite"
          )

          for PLUGIN in "${PLUGINS[@]}"; do
            echo ""
            echo "==== Validating $PLUGIN ===="

            PLUGIN_JSON="packages/$PLUGIN/.claude-plugin/plugin.json"
            MARKETPLACE_JSON="packages/$PLUGIN/.claude-plugin/marketplace.json"

            # Check plugin.json exists
            if [ ! -f "$PLUGIN_JSON" ]; then
              echo "Error: $PLUGIN_JSON not found"
              exit 1
            fi

            # Validate JSON syntax
            cat "$PLUGIN_JSON" | python -m json.tool > /dev/null || exit 1

            # Check required fields
            cat > /tmp/validate_plugin.py << 'PYEOF'
import json
import sys
import os

plugin_json = os.environ.get('PLUGIN_JSON', '')
plugin_name = os.environ.get('PLUGIN', '')

with open(plugin_json) as f:
    plugin = json.load(f)

required_fields = ["name", "version", "description"]
missing = [f for f in required_fields if f not in plugin]

if missing:
    print(f"Error: Missing required fields in {plugin_name}: {missing}")
    sys.exit(1)

print(f"✓ {plugin['name']} v{plugin['version']}")
PYEOF
            export PLUGIN_JSON PLUGIN
            python3 /tmp/validate_plugin.py

            # Validate marketplace.json if it exists
            if [ -f "$MARKETPLACE_JSON" ]; then
              cat "$MARKETPLACE_JSON" | python -m json.tool > /dev/null || exit 1
              echo "✓ marketplace.json valid"
            fi
          done

          echo ""
          echo "==== All plugins validated successfully! ===="

      - name: Validate root marketplace
        run: |
          echo "Validating root marketplace.json..."

          MARKETPLACE_JSON=".claude-plugin/marketplace.json"

          if [ ! -f "$MARKETPLACE_JSON" ]; then
            echo "Error: Root marketplace.json not found"
            exit 1
          fi

          # Validate JSON syntax
          cat "$MARKETPLACE_JSON" | python -m json.tool > /dev/null

          # Check all plugins are listed
          cat > /tmp/validate_marketplace.py << 'PYEOF'
import json
import sys

with open(".claude-plugin/marketplace.json") as f:
    marketplace = json.load(f)

expected_plugins = ["popkit-core", "popkit-dev", "popkit-ops", "popkit-research", "popkit-suite"]
actual_plugins = [p["name"] for p in marketplace.get("plugins", [])]

missing = set(expected_plugins) - set(actual_plugins)
if missing:
    print(f"Error: Plugins missing from marketplace: {missing}")
    sys.exit(1)

print(f"✓ All {len(actual_plugins)} plugins listed in marketplace")
print(f"✓ Marketplace version: {marketplace.get('metadata', {}).get('version', 'unknown')}")
PYEOF
          python3 /tmp/validate_marketplace.py

          echo "Root marketplace.json validation passed!"

  # =============================================================================
  # AGENT CONFIGURATION VALIDATION
  # =============================================================================

  agents-validate:
    name: Validate Agents
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count agents across plugins
        run: |
          echo "Counting agents in modular plugin structure..."

          TOTAL=0

          for PLUGIN in popkit-core popkit-dev popkit-ops popkit-research; do
            AGENT_DIR="packages/$PLUGIN/agents"
            if [ -d "$AGENT_DIR" ]; then
              COUNT=$(find "$AGENT_DIR" -name "AGENT.md" 2>/dev/null | wc -l)
              echo "  $PLUGIN: $COUNT agents"
              TOTAL=$((TOTAL + COUNT))
            fi
          done

          echo ""
          echo "Total agents across all plugins: $TOTAL"
          echo "✓ Agent validation passed"

  # =============================================================================
  # HOOKS VALIDATION
  # =============================================================================

  hooks-validate:
    name: Validate Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate hooks across plugins
        run: |
          echo "Validating hooks in modular plugin structure..."

          for PLUGIN in popkit-core popkit-dev popkit-ops popkit-research; do
            HOOKS_DIR="packages/$PLUGIN/hooks"

            if [ -d "$HOOKS_DIR" ]; then
              echo ""
              echo "==== Checking $PLUGIN hooks ===="

              # Check for hooks.json
              if [ -f "$HOOKS_DIR/hooks.json" ]; then
                cat "$HOOKS_DIR/hooks.json" | python -m json.tool > /dev/null && echo "  ✓ hooks.json valid"
              fi

              # Check Python syntax
              if [ -d "$HOOKS_DIR" ]; then
                HOOK_COUNT=$(find "$HOOKS_DIR" -name "*.py" 2>/dev/null | wc -l)
                if [ "$HOOK_COUNT" -gt 0 ]; then
                  find "$HOOKS_DIR" -name "*.py" -exec python -m py_compile {} \; && echo "  ✓ $HOOK_COUNT Python hooks valid"
                fi
              fi
            fi
          done

          echo ""
          echo "✓ Hook validation passed"

  # =============================================================================
  # CLOUD API VALIDATION
  # =============================================================================

  cloud-validate:
    name: Validate Cloud API
    runs-on: ubuntu-latest
    # Cloud API is optional (marked export-ignore for public repo)
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if cloud package exists
        id: check_cloud
        run: |
          if [ -d "packages/cloud" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✓ Cloud package found"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠ Cloud package not found (expected in private repo only)"
            exit 0
          fi

      - name: Setup Node.js
        if: steps.check_cloud.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check_cloud.outputs.exists == 'true'
        run: |
          cd packages/cloud
          npm install

      - name: TypeScript check
        if: steps.check_cloud.outputs.exists == 'true'
        run: |
          cd packages/cloud
          npx tsc --noEmit || echo "⚠ TypeScript errors detected (non-blocking)"

      - name: Validate wrangler.toml
        if: steps.check_cloud.outputs.exists == 'true'
        run: |
          if [ ! -f "packages/cloud/wrangler.toml" ]; then
            echo "Warning: wrangler.toml not found"
          else
            echo "✓ wrangler.toml exists"
          fi

  # =============================================================================
  # SUMMARY JOB
  # =============================================================================

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs:
      - plugin-validate
      - agents-validate
      - hooks-validate
      - cloud-validate
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.plugin-validate.result }}" != "success" ]; then
            echo "Plugin validation failed"
            exit 1
          fi
          if [ "${{ needs.agents-validate.result }}" != "success" ]; then
            echo "Agents validation failed"
            exit 1
          fi
          if [ "${{ needs.hooks-validate.result }}" != "success" ]; then
            echo "Hooks validation failed"
            exit 1
          fi
          # Cloud validation is optional - doesn't block CI
          if [ "${{ needs.cloud-validate.result }}" != "success" ]; then
            echo "⚠️ Cloud validation failed (non-blocking)"
          fi

          echo "All CI checks passed!"

      - name: Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin Validation | ${{ needs.plugin-validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agents Validation | ${{ needs.agents-validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hooks Validation | ${{ needs.hooks-validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Validation | ${{ needs.cloud-validate.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
