# Release Drafter
#
# Automatically drafts release notes based on merged PRs and commits.
# Groups changes by type (features, bug fixes, docs, etc.)
#
# Part of Issue #179 (Add GitHub Actions workflows)
# Fixed config patterns in Issue #183 CI fix

name: Release Drafter

on:
  push:
    branches:
      - master
      - main
  # Use pull_request_target for autolabeler with forked PRs (more secure)
  pull_request_target:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-release-draft:
    name: Update Release Draft
    runs-on: ubuntu-latest

    steps:
      - name: Draft release notes
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
