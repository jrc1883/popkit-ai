# Enhanced CI Pipeline with Comprehensive Plugin Validation
#
# Prevents plugin.json format issues like the repository field object-vs-string problem
# Runs comprehensive validation using JSON schemas and field type checks
#
# Validation Levels:
# - Level 1: JSON syntax and structure
# - Level 2: Field types and formats (repository string, author object, etc.)
# - Level 3: Cross-plugin consistency
# - Level 4: Security and best practices

name: Enhanced CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: enhanced-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # LEVEL 1: JSON SYNTAX & STRUCTURE VALIDATION
  # ===========================================================================

  json-syntax-validation:
    name: JSON Syntax Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all JSON files
        run: |
          echo "Validating JSON syntax..."

          find . -name "*.json" -not -path "*/node_modules/*" | while read file; do
            echo "Checking $file..."
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done

          echo "✅ All JSON files valid"

  # ===========================================================================
  # LEVEL 2: PLUGIN MANIFEST VALIDATION (plugin.json)
  # ===========================================================================

  plugin-manifest-validation:
    name: Plugin Manifest Validation
    runs-on: ubuntu-latest
    needs: json-syntax-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run comprehensive plugin validation
        run: |
          echo "Running comprehensive validation on all plugins..."
          python3 .github/scripts/comprehensive-validation.py --all packages/

          echo ""
          echo "✅ Plugin manifest validation passed"

  # ===========================================================================
  # LEVEL 2B: FIELD TYPE VALIDATION (Critical for repository field)
  # ===========================================================================

  field-type-validation:
    name: Field Type Validation
    runs-on: ubuntu-latest
    needs: json-syntax-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository field is string (not object)
        run: |
          echo "Validating repository field format..."

          PLUGINS=(
            "popkit-core"
            "popkit-dev"
            "popkit-ops"
            "popkit-research"
          )

          for PLUGIN in "${PLUGINS[@]}"; do
            MANIFEST="packages/$PLUGIN/.claude-plugin/plugin.json"

            if [ ! -f "$MANIFEST" ]; then
              echo "❌ Missing: $MANIFEST"
              exit 1
            fi

            # Check if repository field is string (not object)
            REPO_TYPE=$(python3 -c "
import json
import sys
with open('$MANIFEST') as f:
    data = json.load(f)
    if 'repository' in data:
        print(type(data['repository']).__name__)
    else:
        print('missing')
" 2>&1)

            if [ "$REPO_TYPE" = "dict" ]; then
              echo "❌ $PLUGIN: repository field is object (must be string)"
              echo "   Found: {type: git, url: ..., directory: ...}"
              echo "   Expected: \"https://github.com/user/repo\""
              exit 1
            elif [ "$REPO_TYPE" = "str" ]; then
              echo "✅ $PLUGIN: repository field is string"
            fi
          done

          echo ""
          echo "✅ All repository fields use correct string format"

      - name: Validate author field structure
        run: |
          echo "Validating author field format..."

          python3 -c "
import json
import sys
from pathlib import Path

plugins = ['popkit-core', 'popkit-dev', 'popkit-ops', 'popkit-research']
errors = []

for plugin in plugins:
    manifest_path = Path('packages') / plugin / '.claude-plugin' / 'plugin.json'
    with open(manifest_path) as f:
        data = json.load(f)

    if 'author' in data:
        author = data['author']
        if not isinstance(author, dict):
            errors.append(f'{plugin}: author must be object (found {type(author).__name__})')
        elif 'name' not in author:
            errors.append(f'{plugin}: author.name is required')
        elif 'email' in author and '@' not in author['email']:
            errors.append(f'{plugin}: invalid email format')

if errors:
    for error in errors:
        print(f'❌ {error}')
    sys.exit(1)
else:
    print('✅ All author fields valid')
"

      - name: Validate version field is semantic version
        run: |
          echo "Validating semantic version format..."

          python3 -c "
import json
import re
import sys
from pathlib import Path

semver_pattern = r'^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'

plugins = ['popkit-core', 'popkit-dev', 'popkit-ops', 'popkit-research']
errors = []

for plugin in plugins:
    manifest_path = Path('packages') / plugin / '.claude-plugin' / 'plugin.json'
    with open(manifest_path) as f:
        data = json.load(f)

    if 'version' in data:
        version = data['version']
        if not isinstance(version, str):
            errors.append(f'{plugin}: version must be string (found {type(version).__name__})')
        elif not re.match(semver_pattern, version):
            errors.append(f'{plugin}: invalid semver format: {version}')

if errors:
    for error in errors:
        print(f'❌ {error}')
    sys.exit(1)
else:
    print('✅ All versions use semantic versioning')
"

  # ===========================================================================
  # LEVEL 3: MARKETPLACE VALIDATION
  # ===========================================================================

  marketplace-validation:
    name: Marketplace Validation
    runs-on: ubuntu-latest
    needs: plugin-manifest-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate marketplace.json consistency
        run: |
          echo "Validating marketplace.json..."
          python3 .github/scripts/comprehensive-validation.py --marketplace marketplace.json

          echo "✅ Marketplace validation passed"

  # ===========================================================================
  # LEVEL 4: CROSS-PLUGIN VALIDATION
  # ===========================================================================

  cross-plugin-validation:
    name: Cross-Plugin Validation
    runs-on: ubuntu-latest
    needs: plugin-manifest-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for version consistency across plugins
        run: |
          echo "Checking version consistency..."

          python3 -c "
import json
from pathlib import Path

plugins = ['popkit-core', 'popkit-dev', 'popkit-ops', 'popkit-research']
versions = {}

for plugin in plugins:
    manifest_path = Path('packages') / plugin / '.claude-plugin' / 'plugin.json'
    with open(manifest_path) as f:
        data = json.load(f)
    versions[plugin] = data.get('version', 'missing')

unique_versions = set(versions.values())

print('Plugin versions:')
for plugin, version in versions.items():
    print(f'  {plugin}: {version}')

if len(unique_versions) > 1:
    print('⚠️  Warning: Plugins have different versions')
    print('   Consider aligning versions for marketplace consistency')
else:
    print('✅ All plugins use same version')
"

      - name: Check for duplicate command names
        run: |
          echo "Checking for command name conflicts..."

          python3 -c "
from pathlib import Path
import re

plugins = ['popkit-core', 'popkit-dev', 'popkit-ops', 'popkit-research']
all_commands = {}

for plugin in plugins:
    commands_dir = Path('packages') / plugin / 'commands'
    if commands_dir.exists():
        for cmd_file in commands_dir.glob('*.md'):
            cmd_name = cmd_file.stem
            if cmd_name in all_commands:
                print(f'❌ Duplicate command: {cmd_name}')
                print(f'   Found in: {all_commands[cmd_name]} and {plugin}')
                exit(1)
            all_commands[cmd_name] = plugin

print(f'✅ No duplicate commands (checked {len(all_commands)} commands)')
"

  # ===========================================================================
  # LEVEL 5: HOOKS VALIDATION
  # ===========================================================================

  hooks-validation:
    name: Hooks Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate hooks.json structure
        run: |
          echo "Validating hooks.json files..."

          for PLUGIN in popkit-core popkit-dev popkit-ops popkit-research; do
            HOOKS_FILE="packages/$PLUGIN/hooks/hooks.json"

            if [ -f "$HOOKS_FILE" ]; then
              echo "Validating $PLUGIN hooks..."

              # Validate JSON syntax
              if ! python3 -m json.tool "$HOOKS_FILE" > /dev/null 2>&1; then
                echo "❌ Invalid JSON in $HOOKS_FILE"
                exit 1
              fi

              # Validate root 'hooks' object exists
              HAS_HOOKS=$(python3 -c "
import json
with open('$HOOKS_FILE') as f:
    data = json.load(f)
print('hooks' in data)
" 2>&1)

              if [ "$HAS_HOOKS" != "True" ]; then
                echo "❌ Missing 'hooks' root object in $HOOKS_FILE"
                exit 1
              fi

              echo "✅ $PLUGIN hooks valid"
            fi
          done

      - name: Validate hook scripts use ${CLAUDE_PLUGIN_ROOT}
        run: |
          echo "Checking hook scripts for ${CLAUDE_PLUGIN_ROOT} usage..."

          python3 -c "
import json
from pathlib import Path

plugins = ['popkit-core', 'popkit-dev', 'popkit-ops', 'popkit-research']
warnings = []

for plugin in plugins:
    hooks_file = Path('packages') / plugin / 'hooks' / 'hooks.json'
    if hooks_file.exists():
        with open(hooks_file) as f:
            hooks_data = json.load(f)

        for event, matchers in hooks_data.get('hooks', {}).items():
            for matcher in matchers:
                for hook in matcher.get('hooks', []):
                    if hook.get('type') == 'command':
                        cmd = hook.get('command', '')
                        if '\${CLAUDE_PLUGIN_ROOT}' not in cmd and 'python' in cmd.lower():
                            warnings.append(f'{plugin}/{event}: {cmd}')

if warnings:
    print('⚠️  Warnings: Some hook commands may not use \${CLAUDE_PLUGIN_ROOT}:')
    for warning in warnings:
        print(f'   {warning}')
else:
    print('✅ All hook commands use \${CLAUDE_PLUGIN_ROOT}')
"

  # ===========================================================================
  # LEVEL 6: SECURITY CHECKS
  # ===========================================================================

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."

          # Check for common secret patterns
          if grep -r -E "password\s*=\s*['\"]" --include="*.py" --include="*.json" packages/; then
            echo "❌ Found potential hardcoded password"
            exit 1
          fi

          if grep -r -E "api[_-]?key\s*=\s*['\"]" --include="*.py" --include="*.json" packages/; then
            echo "❌ Found potential hardcoded API key"
            exit 1
          fi

          echo "✅ No obvious secrets found"

      - name: Check for shell=True in Python scripts
        run: |
          echo "Checking for unsafe subprocess usage..."

          if grep -r "shell=True" --include="*.py" packages/; then
            echo "❌ Found shell=True in subprocess calls (security risk)"
            exit 1
          fi

          echo "✅ No unsafe subprocess calls found"

  # ===========================================================================
  # LEVEL 7: DOCUMENTATION CHECKS
  # ===========================================================================

  documentation-checks:
    name: Documentation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for required files
        run: |
          echo "Checking for required documentation files..."

          REQUIRED_FILES=(
            "README.md"
            "CHANGELOG.md"
            "LICENSE"
            "CLAUDE.md"
          )

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "❌ Missing required file: $FILE"
              exit 1
            fi
            echo "✅ Found: $FILE"
          done

      - name: Check package READMEs
        run: |
          echo "Checking package documentation..."

          for PLUGIN in popkit-core popkit-dev popkit-ops popkit-research; do
            README="packages/$PLUGIN/README.md"
            if [ ! -f "$README" ]; then
              echo "❌ Missing: $README"
              exit 1
            fi
            echo "✅ Found: $README"
          done

  # ===========================================================================
  # EXISTING TESTS: RUN PLUGIN TEST SUITE
  # ===========================================================================

  plugin-tests:
    name: Plugin Test Suite
    runs-on: ubuntu-latest
    needs: [plugin-manifest-validation, field-type-validation]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run PopKit test suite
        run: |
          cd packages/popkit-core
          python3 run_all_tests.py

          echo "✅ All plugin tests passed"

  # ===========================================================================
  # CI SUMMARY
  # ===========================================================================

  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs:
      - json-syntax-validation
      - plugin-manifest-validation
      - field-type-validation
      - marketplace-validation
      - cross-plugin-validation
      - hooks-validation
      - security-checks
      - documentation-checks
      - plugin-tests

    steps:
      - name: Summary
        run: |
          echo "=================================="
          echo "✅ Enhanced CI Pipeline Complete"
          echo "=================================="
          echo ""
          echo "All validation checks passed:"
          echo "  ✅ JSON syntax validation"
          echo "  ✅ Plugin manifest validation"
          echo "  ✅ Field type validation (repository, author, version)"
          echo "  ✅ Marketplace validation"
          echo "  ✅ Cross-plugin validation"
          echo "  ✅ Hooks validation"
          echo "  ✅ Security checks"
          echo "  ✅ Documentation checks"
          echo "  ✅ Plugin test suite"
          echo ""
          echo "Safe to merge! 🎉"
