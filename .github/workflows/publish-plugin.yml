# Publish Plugin to Public Repository
#
# This workflow syncs packages/plugin/ from the private monorepo to the
# public jrc1883/popkit-claude repository for open-source distribution.
#
# NOTE: This workflow now uses a FILTERED publish approach that excludes
# implementation code (power-mode, templates, hooks/utils). Only declarative
# content is published to protect IP.
#
# Triggers:
# - Manual dispatch (workflow_dispatch) with optional version tag
# - Push to master when packages/plugin/ changes (optional auto-sync)
#
# Required Secrets:
# - PLUGIN_PUBLIC_REPO_TOKEN: PAT with repo scope for jrc1883/popkit-claude

name: Publish Plugin

on:
  # Manual trigger - primary method
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g., v1.0.0). Leave empty for no tag.'
        required: false
        type: string
      dry_run:
        description: 'Preview changes without pushing'
        required: false
        type: boolean
        default: false
      target_branch:
        description: 'Target branch in public repo'
        required: false
        type: string
        default: 'main'

  # Automatic sync on plugin changes (disabled by default - uncomment to enable)
  # push:
  #   branches:
  #     - master
  #   paths:
  #     - 'packages/plugin/**'
  #     - '.github/workflows/publish-plugin.yml'

concurrency:
  group: publish-plugin
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to Public Repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout monorepo (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for subtree split

      - name: Configure Git
        run: |
          git config user.email 'claude-code@anthropic.com'
          git config user.name 'PopKit Release Bot'

      - name: Add public repo remote
        env:
          GITHUB_TOKEN: ${{ secrets.PLUGIN_PUBLIC_REPO_TOKEN }}
        run: |
          git remote add plugin-public \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/jrc1883/popkit-claude.git"
          echo "Remote added: plugin-public"

      - name: Prepare filtered plugin content
        id: prepare
        run: |
          echo "Preparing filtered plugin content..."

          # Run the prepare script to filter content
          bash .github/scripts/prepare-public-plugin.sh './public-plugin-staging'

          # Create a new branch with just the filtered content
          cd 'public-plugin-staging'
          git init
          git add .
          git commit -m "Filtered plugin content for v${{ inputs.version || 'dev' }}"

          COMMIT_SHA=$(git rev-parse HEAD)
          echo "sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Prepared content: ${COMMIT_SHA}"

      - name: Preview changes (dry run)
        if: ${{ inputs.dry_run == true }}
        run: |
          {
            echo "=== DRY RUN - No changes will be pushed ==="
            echo ""
            echo "Source: packages/plugin/ (filtered)"
            echo "Target: jrc1883/popkit-claude (${{ inputs.target_branch || 'main' }})"
            echo "Prepared SHA: ${{ steps.prepare.outputs.sha }}"
            echo ""
            echo "Files in filtered content:"
          }
          ls -la 'public-plugin-staging/'

      - name: Push to public repository
        if: ${{ inputs.dry_run != true }}
        env:
          GITHUB_TOKEN: ${{ secrets.PLUGIN_PUBLIC_REPO_TOKEN }}
        run: |
          TARGET_BRANCH="${{ inputs.target_branch || 'main' }}"
          echo "Pushing to jrc1883/popkit-claude (${TARGET_BRANCH})..."

          cd 'public-plugin-staging'
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/jrc1883/popkit-claude.git"
          git push origin "HEAD:${TARGET_BRANCH}" --force

          echo "Push complete!"

      - name: Create version tag
        if: ${{ inputs.dry_run != true && inputs.version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PLUGIN_PUBLIC_REPO_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          echo "Creating tag: ${VERSION}"

          cd 'public-plugin-staging'
          git tag "${VERSION}"
          git push origin "${VERSION}"

          echo "Tag ${VERSION} pushed to public repo"

      - name: Create GitHub Release
        if: ${{ inputs.dry_run != true && inputs.version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PLUGIN_PUBLIC_REPO_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"

          # Create release in public repo
          gh release create "${VERSION}" \
            --repo 'jrc1883/popkit-claude' \
            --title "PopKit Claude ${VERSION}" \
            --notes "## What's Changed

          See CHANGELOG.md for details.

          ## Installation

          \`\`\`
          /plugin marketplace add jrc1883/popkit-claude
          /plugin install popkit@popkit-claude
          \`\`\`

          ---
          Published from private monorepo via GitHub Actions"

      - name: Summary
        run: |
          {
            echo "## Publish Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Source | \`packages/plugin/\` (filtered) |"
            echo "| Target | \`jrc1883/popkit-claude\` |"
            echo "| Branch | \`${{ inputs.target_branch || 'main' }}\` |"
            echo "| Version | ${{ inputs.version || 'none' }} |"
            echo "| Dry Run | ${{ inputs.dry_run }} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ inputs.dry_run }}" != "true" ]; then
            {
              echo "### Installation"
              echo "\`\`\`"
              echo "/plugin marketplace add jrc1883/popkit-claude"
              echo "/plugin install popkit@popkit-claude"
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
