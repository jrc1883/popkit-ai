# Release Drafter Configuration
#
# Defines how release notes are categorized and formatted.
# Uses conventional commit prefixes to group changes.
#
# Part of Issue #179 (Add GitHub Actions workflows)

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Version resolution based on labels
version-resolver:
  major:
    labels:
      - 'breaking-change'
      - 'major'
  minor:
    labels:
      - 'enhancement'
      - 'feature'
  patch:
    labels:
      - 'bug'
      - 'bugfix'
      - 'documentation'
      - 'chore'
  default: patch

# Categories for grouping changes
categories:
  - title: '🚀 Features'
    labels:
      - 'enhancement'
      - 'feature'
    collapse-after: 5
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'bugfix'
      - 'fix'
    collapse-after: 5
  - title: '🔧 Improvements'
    labels:
      - 'improvement'
      - 'refactor'
      - 'performance'
    collapse-after: 5
  - title: '📚 Documentation'
    labels:
      - 'documentation'
      - 'docs'
    collapse-after: 3
  - title: '🏗️ Infrastructure'
    labels:
      - 'infra'
      - 'ci'
      - 'dependencies'
    collapse-after: 3
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '⚠️ Breaking Changes'
    labels:
      - 'breaking-change'

# Auto-labeler based on commit/PR title
# Simplified patterns for better compatibility
autolabeler:
  - label: 'enhancement'
    title:
      - '/^feat/i'
      - '/^feature/i'
  - label: 'bug'
    title:
      - '/^fix/i'
      - '/^bugfix/i'
  - label: 'documentation'
    title:
      - '/^docs/i'
  - label: 'refactor'
    title:
      - '/^refactor/i'
  - label: 'chore'
    title:
      - '/^chore/i'
  - label: 'ci'
    title:
      - '/^ci/i'
  - label: 'performance'
    title:
      - '/^perf/i'
  - label: 'breaking-change'
    title:
      - '/!:/i'
  - label: 'plugin'
    files:
      - 'packages/plugin/**/*'
  - label: 'cloud'
    files:
      - 'packages/cloud/**/*'
  - label: 'hooks'
    files:
      - 'packages/plugin/hooks/**/*'

# Exclude certain labels from release notes
exclude-labels:
  - 'skip-changelog'
  - 'wontfix'
  - 'duplicate'
  - 'invalid'

# Exclude contributors (bots)
exclude-contributors:
  - 'dependabot[bot]'
  - 'github-actions[bot]'

# Release notes template
template: |
  ## What's Changed

  $CHANGES

  ## Installation

  ```
  /plugin marketplace add jrc1883/popkit-ai
  /plugin install popkit@popkit-claude
  ```

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

  ---
  _🤖 This release was automatically drafted by [release-drafter](https://github.com/release-drafter/release-drafter)_

# PR body template for contributors
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

# Sort changes by merge date (valid values: merged_at, title)
sort-by: merged_at
sort-direction: descending

# Replacers for cleaning up commit messages
# Note: Using simpler pattern syntax
replacers:
  - search: '/\(#\d+\)/'
    replace: ''
